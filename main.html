<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>module29 English Janala Project</title>

    <!-- febicon set -->
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">

    <!-- tailwind + daisyui ui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- css file link -->
    <link rel="stylesheet" href="./css/style.css">

    <!-- font intigretion -->
    <!-- poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <!-- hind siliguri -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <!-- header section start -->
    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="navbar-start">
                <div class="dropdown">
                    <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h8m-8 6h16" />
                        </svg>
                    </div>
                    <ul tabindex="-1"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow space-y-2">
                        <li>
                            <a href=""> <i class="fa-solid fa-circle-question"></i>
                                FAQ</a>
                        </li>
                        <li>
                            <a href=""><i class="fa-solid fa-book-open"></i>
                                Learn</a>
                        </li>
                        <li>
                            <a href="login.html"> <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
                        </li>
                    </ul>
                </div>
                <a class="flex items-center gap-2 text-2xl font-semibold ">
                    <span>English</span>
                    <img src="./assets/logo.png" alt="logo">
                    <span class=" text-xl font-bangla">জানালা</span>
                </a>
            </div>

            <div class="navbar-end hidden lg:flex">
                <ul class="menu menu-horizontal px-1 space-x-4">
                    <li>
                        <a href="" class="btn btn-outline btn-primary"> <i class="fa-solid fa-circle-question"></i>
                            FAQ</a>
                    </li>
                    <li>
                        <a href="" class="btn btn-outline btn-primary"><i class="fa-solid fa-book-open"></i> Learn</a>
                    </li>
                    <li>
                        <a href="login.html" class="btn btn-outline btn-primary"> <i
                                class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </header>
    <!-- header section end -->

    <!-- main section start -->
    <main>
        <!-- lesson section start -->
        <section class="container mx-auto p-5 mt-36">
            <div>
                <h2 class="text-4xl font-bold text-center"><span class="text-blue-400">Let's</span> Learn Vocabularies
                </h2>
                <div id="lesson-container" class="mt-5  flex flex-wrap justify-center items-center gap-5 ">
                </div>
            </div>
        </section>
        <!-- lesson section end -->

        <!-- level word show section start -->
        <section id="level-word-container" class="container mx-auto p-5 bg-gray-100 py-10 my-10 rounded-sm ">
            <div class="flex flex-col items-center justify-center space-y-4">
                <p class="bangla-font font-medium ">আপনি এখনো কোন Lesson Select করেন নি</p>
                <h3 class="bangla-font text-3xl font-semibold ">একটি Lesson Select করুন।</h3>
            </div>
        </section>
        <!-- level word show section end -->


        <!-- Open the modal using ID.showModal() method -->
        <dialog id="my_modal" class="modal">
            <div class="modal-box">

                <div id="modal-detail-container">
                    
                </div>

                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </main>
    <!-- main section end -->

    <script src="./script/script.js"></script>
</body>

</html>
